<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Дневник тренировок · ФМ4М</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700&family=Onest:wght@400;500;600;700&display=swap&subset=cyrillic,cyrillic-ext,latin" rel="stylesheet">
<style>
  :root{--ink:#15150F;--paper:#F4F3ED;--card:#FFFFFF;--muted:#8C8B81;--line:#E7E5DC;--accent:#C7F23D;--accent-deep:#3E4D00;--accent-soft:#EEF8C9;--shadow:0 8px 30px rgba(30,30,15,0.06);--shadow-lift:0 12px 40px rgba(30,30,15,0.12);}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:'Onest',system-ui,sans-serif;background:#DEDCD2;background-image:radial-gradient(circle at 30% 0%,#E9E7DD 0%,#D6D4C9 100%);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 12px;}
  .phone{width:100%;max-width:400px;height:840px;max-height:96vh;background:var(--paper);border-radius:40px;box-shadow:var(--shadow-lift);overflow:hidden;position:relative;display:flex;flex-direction:column;border:1px solid rgba(255,255,255,0.6);}
  .screen{flex:1;overflow-y:auto;overflow-x:hidden;padding:22px 20px 110px;scrollbar-width:none;}
  .screen::-webkit-scrollbar{display:none;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .view{animation:fade .3s ease;}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
  .hello{font-size:13px;color:var(--muted);font-weight:500;}
  .title-xl{font-family:'Unbounded';font-weight:600;font-size:26px;letter-spacing:-0.5px;line-height:1.1;}
  .avatar{width:42px;height:42px;border-radius:14px;background:var(--ink);color:var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Unbounded';font-weight:600;font-size:15px;cursor:pointer;}
  .stat-row{display:flex;gap:12px;margin-bottom:24px;}
  .stat{flex:1;background:var(--card);border-radius:22px;padding:16px 16px 18px;box-shadow:var(--shadow);}
  .stat.lime{background:var(--accent);}
  .stat .lab{font-size:12px;color:var(--muted);font-weight:500;display:flex;align-items:center;gap:5px;}
  .stat.lime .lab{color:var(--accent-deep);}
  .stat .num{font-family:'Unbounded';font-weight:600;font-size:30px;margin-top:8px;letter-spacing:-1px;}
  .stat.lime .num{color:var(--accent-deep);}
  .stat .sub{font-size:11px;color:var(--muted);margin-top:2px;}
  .stat.lime .sub{color:#586800;}
  .section-h{display:flex;align-items:center;justify-content:space-between;margin:6px 2px 14px;}
  .section-h h2{font-family:'Unbounded';font-weight:500;font-size:17px;letter-spacing:-0.3px;}
  .section-h a{font-size:13px;color:var(--muted);font-weight:500;text-decoration:none;cursor:pointer;}
  .wcard{background:var(--card);border-radius:24px;padding:18px;margin-bottom:13px;box-shadow:var(--shadow);cursor:pointer;transition:transform .15s ease;position:relative;overflow:hidden;}
  .wcard:active{transform:scale(0.98);}
  .wcard .date{font-size:12px;color:var(--muted);font-weight:500;}
  .wcard .wname{font-family:'Unbounded';font-weight:500;font-size:18px;margin-top:4px;letter-spacing:-0.3px;}
  .wcard .meta{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
  .wcard .arrow{position:absolute;right:18px;top:18px;width:30px;height:30px;border-radius:10px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;}
  .ctag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:4px 9px;border-radius:9px;background:var(--accent-soft);color:var(--accent-deep);}
  .ctag.gray{background:var(--paper);color:#56554c;}
  .ctag.plan{background:transparent;border:1.5px solid var(--ink);color:var(--ink);}
  .empty{background:var(--card);border-radius:24px;padding:34px 22px;text-align:center;box-shadow:var(--shadow);color:var(--muted);}
  .empty svg{width:34px;height:34px;stroke:var(--muted);margin-bottom:12px;}
  .empty p{font-size:14px;line-height:1.5;}
  .fab{position:absolute;left:20px;right:20px;bottom:88px;z-index:5;}
  .fab button{width:100%;border:none;background:var(--ink);color:#fff;font-family:'Onest';font-weight:600;font-size:16px;padding:18px;border-radius:20px;display:flex;align-items:center;justify-content:center;gap:9px;cursor:pointer;box-shadow:0 10px 28px rgba(21,21,15,0.28);transition:transform .15s ease;}
  .fab button:active{transform:scale(0.97);}
  .fab button .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);}
  .nav{position:absolute;left:0;right:0;bottom:0;height:78px;background:rgba(244,243,237,0.92);backdrop-filter:blur(16px);border-top:1px solid var(--line);display:flex;padding:8px 8px 22px;z-index:4;}
  .nav button{flex:1;border:none;background:none;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--muted);font-size:10.5px;font-weight:500;cursor:pointer;font-family:'Onest';}
  .nav button svg{width:22px;height:22px;}
  .nav button.on{color:var(--ink);}
  .bhead{display:flex;align-items:center;gap:14px;margin-bottom:20px;}
  .bback{width:42px;height:42px;border-radius:14px;background:var(--card);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;flex-shrink:0;}
  .bback svg{width:18px;height:18px;stroke:var(--ink);}
  .bhead .bt{font-family:'Unbounded';font-weight:500;font-size:18px;letter-spacing:-0.3px;}
  .bhead .bd{font-size:12px;color:var(--muted);font-weight:500;margin-top:2px;}
  .tags{display:flex;gap:7px;flex-wrap:wrap;margin:-6px 0 14px;}
  .tag{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:6px 11px;border-radius:12px;white-space:nowrap;}
  .tag.method{background:var(--accent);color:var(--accent-deep);}
  .tag.phase{background:var(--ink);color:#fff;}
  .tag.info{background:var(--card);color:#56554c;box-shadow:var(--shadow);}
  .linkbtn{font-size:13px;font-weight:600;color:var(--muted);background:none;border:none;cursor:pointer;font-family:'Onest';margin-bottom:16px;display:inline-flex;align-items:center;gap:5px;}
  .linkbtn svg{width:14px;height:14px;}
  .ex{background:var(--card);border-radius:24px;padding:18px;margin-bottom:13px;box-shadow:var(--shadow);cursor:pointer;transition:transform .15s ease;}
  .ex:active{transform:scale(0.98);}
  .ex .exhead{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .ex .exname{font-family:'Unbounded';font-weight:500;font-size:15px;letter-spacing:-0.3px;}
  .ex .pr{display:inline-flex;align-items:center;gap:5px;background:var(--accent);color:var(--accent-deep);font-size:11.5px;font-weight:600;padding:5px 10px;border-radius:11px;white-space:nowrap;flex-shrink:0;}
  .ex .pr svg{width:13px;height:13px;}
  .setline{display:flex;gap:7px;margin-top:14px;flex-wrap:wrap;}
  .setchip{background:var(--paper);border-radius:12px;padding:8px 11px;font-size:13px;font-weight:500;}
  .setchip b{font-weight:600;}
  .setchip.empty{color:var(--muted);border:1px dashed var(--line);background:transparent;}
  .mine{font-size:10px;font-weight:600;color:var(--accent-deep);background:var(--accent);padding:3px 7px;border-radius:8px;}
  .lasttime{background:var(--accent-soft);border-radius:20px;padding:15px 17px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
  .lasttime .ll{font-size:11.5px;font-weight:600;color:#5c7a00;display:flex;align-items:center;gap:6px;}
  .lasttime .ll svg{width:13px;height:13px;}
  .lasttime .lv{font-family:'Unbounded';font-weight:500;font-size:16px;color:var(--accent-deep);margin-top:6px;}
  .lasttime .lr{text-align:right;}
  .lasttime .lr .n{font-family:'Unbounded';font-weight:600;font-size:24px;color:var(--accent-deep);line-height:1;}
  .lasttime .lr .t{font-size:11px;color:#5c7a00;margin-top:3px;}
  .pr-banner{background:var(--ink);color:#fff;border-radius:24px;padding:20px 22px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;}
  .pr-banner .l{font-size:12px;color:#b9b8ac;font-weight:500;display:flex;align-items:center;gap:6px;}
  .pr-banner .l svg{width:15px;height:15px;color:var(--accent);}
  .pr-banner .v{font-family:'Unbounded';font-weight:600;font-size:26px;margin-top:6px;letter-spacing:-0.5px;}
  .pr-banner .v span{color:var(--accent);}
  .setrow{background:var(--card);border-radius:18px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow);}
  .setrow .idx{width:30px;height:30px;border-radius:10px;background:var(--accent-soft);color:var(--accent-deep);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;flex-shrink:0;}
  .setrow .vals{flex:1;margin-left:14px;display:flex;align-items:baseline;gap:8px;}
  .setrow .vals .w{font-family:'Unbounded';font-weight:500;font-size:19px;}
  .setrow .vals .x{color:var(--muted);font-size:14px;}
  .setrow .vals .r{font-size:15px;font-weight:600;}
  .setrow .best{font-size:11px;font-weight:600;color:var(--accent-deep);background:var(--accent);padding:4px 8px;border-radius:9px;}
  .setrow .del{border:none;background:none;color:var(--muted);cursor:pointer;padding:4px;}
  .setrow .del svg{width:16px;height:16px;}
  .addset{display:flex;gap:9px;margin-top:6px;align-items:center;}
  .addset input{width:66px;border:1px solid var(--line);background:var(--card);border-radius:15px;padding:13px 6px;font-family:'Onest';font-size:15px;font-weight:600;text-align:center;outline:none;color:var(--ink);}
  .addset input:focus{border-color:var(--ink);}
  .addset .mult{color:var(--muted);font-size:15px;font-weight:600;}
  .addset button{border:none;background:var(--accent);color:var(--accent-deep);border-radius:15px;width:48px;height:46px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-left:auto;}
  .addset button svg{width:22px;height:22px;}
  .hintchip{display:inline-flex;align-items:center;gap:5px;background:var(--accent-soft);color:var(--accent-deep);font-size:12px;font-weight:600;padding:7px 11px;border-radius:11px;margin-top:12px;cursor:pointer;}
  .restpresets{display:flex;gap:8px;margin:16px 0 4px;}
  .restpresets button{flex:1;border:1px solid var(--line);background:var(--card);border-radius:13px;padding:11px 4px;font-family:'Onest';font-weight:600;font-size:13px;color:#56554c;cursor:pointer;box-shadow:var(--shadow);}
  .restpresets button svg{width:14px;height:14px;vertical-align:-2px;margin-right:3px;stroke:#56554c;}
  .comment{background:var(--accent-soft);border-radius:20px;padding:16px;margin-top:20px;}
  .comment .cl{font-size:12px;font-weight:600;color:var(--accent-deep);display:flex;align-items:center;gap:6px;margin-bottom:7px;}
  .comment .cl svg{width:14px;height:14px;}
  .comment textarea{width:100%;border:none;background:transparent;resize:none;font-family:'Onest';font-size:14px;color:#4a4f2f;line-height:1.5;outline:none;min-height:44px;}
  .comment textarea::placeholder{color:#9bb15a;}
  .chartcard{background:var(--card);border-radius:26px;padding:22px 20px 16px;box-shadow:var(--shadow);margin-bottom:16px;}
  .chartcard .ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
  .chartcard .ch .t{font-family:'Unbounded';font-weight:500;font-size:15px;}
  .chartcard .ch .up{font-size:12px;font-weight:600;color:#5c7a00;background:var(--accent-soft);padding:4px 9px;border-radius:10px;}
  .chartcard .big{font-family:'Unbounded';font-weight:600;font-size:32px;letter-spacing:-1px;margin:6px 0 2px;}
  .chartcard .bs{font-size:12px;color:var(--muted);}
  .segbar{display:flex;background:var(--paper);border-radius:14px;padding:4px;margin-bottom:18px;overflow-x:auto;scrollbar-width:none;}
  .segbar::-webkit-scrollbar{display:none;}
  .segbar button{border:none;background:none;padding:9px 14px;border-radius:11px;font-family:'Onest';font-weight:600;font-size:13px;color:var(--muted);cursor:pointer;white-space:nowrap;}
  .segbar button.on{background:var(--ink);color:#fff;}
  .goalcard{background:var(--ink);color:#fff;border-radius:28px;padding:22px;margin-bottom:18px;}
  .goalcard .gt{font-size:12px;color:#b9b8ac;font-weight:500;display:flex;align-items:center;gap:6px;}
  .goalcard .gt svg{width:14px;height:14px;color:var(--accent);}
  .goalcard .gbig{font-family:'Unbounded';font-weight:600;font-size:22px;margin:10px 0 3px;letter-spacing:-0.3px;}
  .goalcard .gbig span{color:var(--accent);}
  .goalcard .gsub{font-size:12px;color:#9a998e;}
  .gprog{height:10px;background:#2c2c22;border-radius:6px;margin-top:16px;overflow:hidden;}
  .gprog i{display:block;height:100%;background:var(--accent);border-radius:6px;}
  .glabels{display:flex;justify-content:space-between;font-size:11px;color:#9a998e;margin-top:8px;}
  .mgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
  .mcard{background:var(--card);border-radius:22px;padding:16px 17px;box-shadow:var(--shadow);}
  .mcard .ml{font-size:12px;color:var(--muted);font-weight:500;}
  .mcard .mv{font-family:'Unbounded';font-weight:600;font-size:25px;letter-spacing:-0.5px;margin-top:7px;}
  .mcard .mv small{font-size:13px;color:var(--muted);font-weight:400;font-family:'Onest';}
  .mcard .md{font-size:12px;font-weight:600;margin-top:5px;display:inline-flex;align-items:center;gap:3px;}
  .mcard .md.down{color:#5c7a00;} .mcard .md.up{color:#b06a00;} .mcard .md.flat{color:var(--muted);}
  .photos{display:flex;gap:11px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
  .photos::-webkit-scrollbar{display:none;}
  .photo{flex:0 0 110px;height:150px;border-radius:20px;position:relative;overflow:hidden;display:flex;align-items:flex-end;padding:11px;background-size:cover;background-position:center;}
  .photo span{font-size:11px;font-weight:600;color:#fff;position:relative;z-index:2;background:rgba(0,0,0,0.4);padding:3px 8px;border-radius:8px;}
  .photo.add{border:2px dashed var(--line);background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted);cursor:pointer;}
  .photo.add svg{width:26px;height:26px;} .photo.add small{font-size:11px;font-weight:500;}
  .calcard{background:var(--card);border-radius:26px;padding:20px 18px 18px;box-shadow:var(--shadow);margin-bottom:16px;}
  .calhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .calhead .cm{font-family:'Unbounded';font-weight:500;font-size:17px;}
  .calhead .cnav{display:flex;gap:8px;}
  .calhead .cnav button{width:32px;height:32px;border-radius:10px;border:none;background:var(--paper);display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .calhead .cnav svg{width:16px;height:16px;stroke:var(--ink);}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .calgrid .dow{font-size:11px;color:var(--muted);text-align:center;font-weight:600;padding-bottom:4px;}
  .cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;}
  .cell.blank{visibility:hidden;}
  .cell .num{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
  .cell.done .num{background:var(--accent);color:var(--accent-deep);font-weight:600;}
  .cell.plan .num{border:1.8px solid var(--ink);color:var(--ink);font-weight:600;}
  .cell.today .num{outline:2px solid var(--accent);outline-offset:2px;}
  .callegend{display:flex;gap:16px;margin-top:14px;padding:0 2px;flex-wrap:wrap;}
  .callegend div{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);}
  .callegend .d1{width:15px;height:15px;border-radius:50%;background:var(--accent);}
  .callegend .d2{width:15px;height:15px;border-radius:50%;border:1.8px solid var(--ink);}
  .plancard{background:var(--card);border-radius:26px;padding:20px 18px;box-shadow:var(--shadow);margin-bottom:16px;}
  .plancard .pttl{font-family:'Unbounded';font-weight:500;font-size:15px;margin-bottom:14px;}
  .weekstrip{display:flex;gap:5px;}
  .day{flex:1;text-align:center;}
  .day .dn{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:6px;}
  .day .db{height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-family:'Unbounded';font-weight:600;font-size:12px;}
  .day .db.work{background:var(--accent);color:var(--accent-deep);}
  .day .db.rest{background:var(--paper);color:var(--muted);font-family:'Onest';font-weight:500;font-size:15px;}
  .formgroup{margin-bottom:16px;}
  .formgroup label{display:block;font-size:13px;font-weight:600;color:#56554c;margin-bottom:8px;}
  .field{width:100%;border:1px solid var(--line);background:var(--card);border-radius:16px;padding:15px 16px;font-family:'Onest';font-size:15px;font-weight:500;outline:none;color:var(--ink);box-shadow:var(--shadow);}
  .field:focus{border-color:var(--ink);}
  select.field{appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' fill='none' stroke='%2315150F' stroke-width='2.4'><path d='M2 5l6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right 16px center;padding-right:42px;cursor:pointer;}
  .savebtn{width:100%;border:none;background:var(--ink);color:#fff;font-family:'Onest';font-weight:600;font-size:16px;padding:17px;border-radius:18px;cursor:pointer;margin-top:8px;transition:transform .15s ease;}
  .savebtn:active{transform:scale(0.98);}
  .savebtn.alt{background:var(--card);color:var(--ink);box-shadow:var(--shadow);margin-top:12px;}
  .twocol{display:flex;gap:12px;} .twocol .formgroup{flex:1;}
  .exrow{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--card);border-radius:16px;padding:14px 16px;margin-bottom:9px;box-shadow:var(--shadow);cursor:pointer;transition:transform .12s ease;}
  .exrow:active{transform:scale(0.98);}
  .exrow .en{font-size:14px;font-weight:500;}
  .exrow.addnew{background:var(--accent-soft);} .exrow.addnew .en{color:var(--accent-deep);font-weight:600;}
  .tplcard{background:var(--card);border-radius:22px;padding:16px 18px;margin-bottom:12px;box-shadow:var(--shadow);}
  .tplcard .tn{font-family:'Unbounded';font-weight:500;font-size:16px;}
  .tplcard .tsub{font-size:12px;color:var(--muted);margin-top:3px;}
  .tplcard .tex{font-size:12px;color:var(--muted);margin-top:9px;line-height:1.5;}
  .tplbtns{display:flex;gap:9px;margin-top:13px;}
  .tplbtns button{flex:1;border:none;border-radius:13px;padding:11px;font-family:'Onest';font-weight:600;font-size:13px;cursor:pointer;}
  .tplbtns .gobtn{background:var(--ink);color:#fff;} .tplbtns .plbtn{background:var(--paper);color:#56554c;}
  .restbar{position:absolute;left:16px;right:16px;bottom:170px;background:var(--ink);color:#fff;border-radius:18px;padding:14px 18px;display:none;align-items:center;justify-content:space-between;z-index:7;box-shadow:var(--shadow-lift);}
  .restbar.on{display:flex;}
  .restbar .rt{font-family:'Unbounded';font-weight:600;font-size:22px;} .restbar .rt b{color:var(--accent);}
  .restbar .rbtns{display:flex;gap:8px;}
  .restbar button{border:none;background:#2c2c22;color:#fff;border-radius:10px;padding:9px 12px;font-family:'Onest';font-weight:600;cursor:pointer;}
  .planbanner{background:var(--accent-soft);border-radius:18px;padding:15px 17px;margin-bottom:16px;}
  .planbanner .pt{font-size:13px;font-weight:600;color:var(--accent-deep);}
  .planbanner button{margin-top:11px;width:100%;border:none;background:var(--ink);color:#fff;border-radius:13px;padding:12px;font-family:'Onest';font-weight:600;cursor:pointer;}
</style>
</head>
<body>
<div class="phone">
  <div class="screen" id="screen"></div>
  <div class="restbar" id="restbar"><div class="rt" id="rt">01:30</div><div class="rbtns"><button onclick="addRest(30)">+30с</button><button onclick="stopRest()">Стоп</button></div></div>
  <div class="nav" id="nav"></div>
</div>
<script>
var TG=window.Telegram&&window.Telegram.WebApp?window.Telegram.WebApp:null;
var CS=TG&&TG.CloudStorage?TG.CloudStorage:null;

var mem={};
function csGet(k){return new Promise(function(res){try{CS.getItem(k,function(err,val){res(err?null:val);});}catch(e){res(null);}});}
function csSet(k,v){return new Promise(function(res){try{CS.setItem(k,v,function(){res();});}catch(e){res();}});}
var Store={
  async get(k){ if(CS){var v=await csGet(k); if(v) return v;} try{var l=localStorage.getItem(k); if(l!=null) return l;}catch(e){} return mem[k]!=null?mem[k]:null; },
  async set(k,v){ mem[k]=v; try{localStorage.setItem(k,v);}catch(e){} if(CS){await csSet(k,v);} }
};

async function load(){var raw=await Store.get(KEY); if(raw){try{state=JSON.parse(raw);}catch(e){state=seed();await save();}} else {state=seed();await save();} if(!state.customExercises)state.customExercises=[]; if(!state.templates)state.templates=[];}
async function save(){await Store.set(KEY,JSON.stringify(state));}

function workoutsDone(){return state.workouts.filter(function(w){return w.status!=='planned';}).sort(function(a,b){return a.date<b.date?1:-1;});}
function findWorkout(id){return state.workouts.find(function(w){return w.id===id;});}
function isCustom(name){return state.customExercises.indexOf(name)>=0 || !LIB.some(function(l){return l.n===name;});}
function bestSet(name){var best=null;state.workouts.forEach(function(w){w.exercises.forEach(function(e){if(e.name===name){e.sets.forEach(function(s){if(!best||s.w>best.w||(s.w===best.w&&s.r>best.r))best={w:s.w,r:s.r};});}});});return best;}
function lastEntry(name,exclId){
  var c=state.workouts.filter(function(w){return w.id!==exclId&&w.exercises.some(function(e){return e.name===name&&e.sets.length;});}).sort(function(a,b){return a.date<b.date?1:-1;});
  if(!c.length)return null; var w=c[0]; var e=w.exercises.find(function(x){return x.name===name;});
  var maxw=Math.max.apply(null,e.sets.map(function(s){return s.w;}));
  var top=e.sets.filter(function(s){return s.w===maxw;}).sort(function(a,b){return b.r-a.r;})[0];
  return {date:w.date,w:maxw,r:top.r,count:e.sets.length};
}
function weeksLeft(){var d=new Date(state.goal.deadline+'T00:00:00');return Math.max(0,Math.round((d-new Date())/(7*864e5)));}

function exMatches(q){
  q=(q||'').toLowerCase().trim();
  var out=[];
  state.customExercises.forEach(function(n){ if(!q||n.toLowerCase().indexOf(q)>=0) out.push({n:n,mine:true}); });
  LIB.forEach(function(l){ var hit=!q||l.n.toLowerCase().indexOf(q)>=0||l.a.some(function(x){return x.toLowerCase().indexOf(q)>=0;}); if(hit) out.push({n:l.n,mine:false}); });
  return out.slice(0,40);
}
function filterEx(q,wid){
  var box=document.getElementById('exlist'); if(!box)return;
  var ms=exMatches(q); var html='';
  var qn=(q||'').trim();
  var exact=ms.some(function(m){return m.n.toLowerCase()===qn.toLowerCase();});
  // показываем «добавить своё», только если введён текст и нет ни одного совпадения,
  // либо явный запрос (нет точного совпадения и ничего не нашли по словарю)
  if(qn && !exact && ms.length===0){ html+='<div class="exrow addnew" onclick="addCustomEx(\''+wid+'\',\''+esc(qn).replace(/'/g,"\\'")+'\')"><span class="en">+ Добавить «'+esc(qn)+'»</span><span class="mine">моё</span></div>'; }
  html+=ms.map(function(m){return '<div class="exrow" onclick="pickEx(\''+wid+'\',\''+esc(m.n).replace(/'/g,"\\'")+'\')"><span class="en">'+esc(m.n)+'</span>'+(m.mine?'<span class="mine">моё</span>':'')+'</div>';}).join('');
  // если есть совпадения, но ни одного точного — даём добавить своё в конце списка
  if(qn && !exact && ms.length>0){ html+='<div class="exrow addnew" onclick="addCustomEx(\''+wid+'\',\''+esc(qn).replace(/'/g,"\\'")+'\')"><span class="en">+ Добавить «'+esc(qn)+'» как своё</span><span class="mine">моё</span></div>'; }
  box.innerHTML=html||'<div class="empty" style="padding:20px"><p>Начни вводить название упражнения.</p></div>';
}

function viewProgress(){
  var names=[];state.workouts.forEach(function(w){w.exercises.forEach(function(e){if(e.sets.length&&names.indexOf(e.name)<0)names.push(e.name);});});
  var sel=route.params.ex||names[0];
  var seg=names.map(function(n){return '<button class="'+(n===sel?'on':'')+'" onclick="go(\'progress\',{ex:\''+esc(n).replace(/'/g,"\\'")+'\'})">'+esc(n)+'</button>';}).join('');
  var pts=[];workoutsDone().slice().reverse().forEach(function(w){var e=w.exercises.find(function(x){return x.name===sel;});if(e&&e.sets.length){pts.push({d:w.date,w:Math.max.apply(null,e.sets.map(function(s){return s.w;}))});}});
  var chart;
  if(pts.length>=2){
    var maxv=Math.max.apply(null,pts.map(function(p){return p.w;})),minv=Math.min.apply(null,pts.map(function(p){return p.w;}));var rng=(maxv-minv)||1;var W=300,H=120;
    var co=pts.map(function(p,i){var x=5+(i/(pts.length-1))*(W-10);var y=H-10-((p.w-minv)/rng)*(H-30);return [Math.round(x),Math.round(y)];});
    var line=co.map(function(c,i){return (i?'L':'M')+c[0]+','+c[1];}).join(' ');
    var area=line+' L'+co[co.length-1][0]+','+H+' L'+co[0][0]+','+H+' Z';var last=co[co.length-1];
    var ch=Math.round((pts[pts.length-1].w-pts[0].w)*10)/10;
    chart='<div class="chartcard"><div class="ch"><span class="t">Рабочий вес</span><span class="up">'+(ch>=0?'↗ +'+ch:'↘ '+ch)+' кг</span></div><div class="big">'+pts[pts.length-1].w+' кг</div><div class="bs">было '+pts[0].w+' кг · '+fmtDate(pts[0].d)+'</div>'
      +'<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="'+H+'" style="margin-top:14px;overflow:visible"><defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#C7F23D" stop-opacity="0.35"/><stop offset="100%" stop-color="#C7F23D" stop-opacity="0"/></linearGradient></defs><path d="'+area+'" fill="url(#g)"/><path d="'+line+'" fill="none" stroke="#15150F" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><circle cx="'+last[0]+'" cy="'+last[1]+'" r="6" fill="#C7F23D" stroke="#15150F" stroke-width="3"/></svg></div>';
  } else { chart='<div class="empty">'+I.bolt+'<p>Нужно минимум 2 тренировки с этим упражнением,<br>чтобы построить график.</p></div>'; }
  return '<div class="view"><div class="topbar"><div><div class="hello">Динамика</div><div class="title-xl">Прогресс</div></div></div>'+(names.length?'<div class="segbar">'+seg+'</div>':'')+chart
    +'<div class="stat-row"><div class="stat"><div class="lab">Всего тренировок</div><div class="num">'+workoutsDone().length+'</div><div class="sub">за всё время</div></div><div class="stat lime"><div class="lab">Упражнений</div><div class="num">'+names.length+'</div><div class="sub">отслеживается</div></div></div><div style="height:40px"></div></div>';
}

    case 'home':v=viewHome();break; case 'start':v=viewStart();break; case 'plan':v=viewPlan();break;
    case 'newWorkout':v=viewNewWorkout();break; case 'workout':v=viewWorkout();break;

async function setWComment(id,v){var w=findWorkout(id);w.comment=v;await save();}
async function setExNote(wid,exId,v){var w=findWorkout(wid);var e=w.exercises.find(function(x){return x.id===exId;});e.note=v;await save();}
async function saveMeasure(){var m={date:todayISO(),weight:parseFloat(document.getElementById('m-w').value)||0,chest:parseFloat(document.getElementById('m-c').value)||0,waist:parseFloat(document.getElementById('m-t').value)||0,hips:parseFloat(document.getElementById('m-h').value)||0};state.measurements.push(m);await save();go('body');}
async function saveGoal(){state.goal.startW=parseFloat(document.getElementById('g-start').value)||state.goal.startW;state.goal.goalW=parseFloat(document.getElementById('g-goal').value)||state.goal.goalW;state.goal.deadline=document.getElementById('g-deadline').value||state.goal.deadline;await save();go('body');}
function addPhoto(input){var f=input.files&&input.files[0];if(!f)return;var img=new Image();var rd=new FileReader();rd.onload=function(){img.onload=function(){var c=document.createElement('canvas');var max=420;var sc=Math.min(1,max/Math.max(img.width,img.height));c.width=img.width*sc;c.height=img.height*sc;c.getContext('2d').drawImage(img,0,0,c.width,c.height);var data=c.toDataURL('image/jpeg',0.7);if(!state.photos)state.photos=[];state.photos.push({label:'Нед '+(state.photos.length+1),data:data});save().then(render);};img.src=rd.result;};rd.readAsDataURL(f);}
function exportData(){try{var blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='fm4m-backup.json';document.body.appendChild(a);a.click();a.remove();}catch(e){alert('Не удалось выгрузить');}}
function importData(input){var f=input.files&&input.files[0];if(!f)return;var rd=new FileReader();rd.onload=function(){try{var data=JSON.parse(rd.result);if(!data.workouts){alert('Файл не похож на резервную копию');return;}if(!confirm('Заменить текущие данные данными из файла?'))return;state=data;if(!state.customExercises)state.customExercises=[];if(!state.templates)state.templates=[];save().then(function(){go('home');});}catch(e){alert('Не удалось прочитать файл');}};rd.readAsText(f);}

/* rest timer */
var restInt=null,restRem=0;
function fmtMS(s){var m=Math.floor(s/60),x=s%60;return (m<10?'0':'')+m+':'+(x<10?'0':'')+x;}
function showRest(){document.getElementById('rt').innerHTML='<b>'+fmtMS(restRem)+'</b>';document.getElementById('restbar').classList.add('on');}
function startRest(sec){restRem=sec;showRest();if(restInt)clearInterval(restInt);restInt=setInterval(function(){restRem--;if(restRem<=0){clearInterval(restInt);restInt=null;document.getElementById('rt').innerHTML='<b>Готово!</b>';try{if(TG&&TG.HapticFeedback)TG.HapticFeedback.notificationOccurred('success');else if(navigator.vibrate)navigator.vibrate(300);}catch(e){}setTimeout(stopRest,1500);}else showRest();},1000);}
function addRest(s){restRem+=s;showRest();}
function stopRest(){if(restInt)clearInterval(restInt);restInt=null;document.getElementById('restbar').classList.remove('on');}

(async function(){await load();render();})();
</script>
</body>
</html>
