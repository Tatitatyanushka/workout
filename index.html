<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Таня тренит</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700&family=Onest:wght@400;500;600;700&display=swap&subset=cyrillic,cyrillic-ext,latin" rel="stylesheet">
<style>
  :root{--ink:#15150F;--paper:#F4F3ED;--card:#FFFFFF;--muted:#8C8B81;--line:#E7E5DC;--accent:#C7F23D;--accent-deep:#3E4D00;--accent-soft:#EEF8C9;--shadow:0 8px 30px rgba(30,30,15,0.06);--shadow-lift:0 12px 40px rgba(30,30,15,0.12);}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:'Onest',system-ui,sans-serif;background:#DEDCD2;background-image:radial-gradient(circle at 30% 0%,#E9E7DD 0%,#D6D4C9 100%);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 12px;}
  .phone{width:100%;max-width:400px;height:840px;max-height:96vh;background:var(--paper);border-radius:40px;box-shadow:var(--shadow-lift);overflow:hidden;position:relative;display:flex;flex-direction:column;border:1px solid rgba(255,255,255,0.6);}
  .screen{flex:1;overflow-y:auto;overflow-x:hidden;padding:22px 20px 110px;scrollbar-width:none;}
  .screen::-webkit-scrollbar{display:none;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .view{animation:fade .3s ease;}
  .topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;}
  .hello{font-size:13px;color:var(--muted);font-weight:500;line-height:1.4;max-width:250px;}
  .title-xl{font-family:'Unbounded';font-weight:600;font-size:26px;letter-spacing:-0.5px;line-height:1.1;margin-top:6px;}
  .gearbtn{width:42px;height:42px;border-radius:14px;background:var(--card);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;flex-shrink:0;}
  .gearbtn svg{width:21px;height:21px;stroke:var(--ink);}
  .stat-row{display:flex;gap:12px;margin-bottom:24px;}
  .stat{flex:1;background:var(--card);border-radius:22px;padding:16px 16px 18px;box-shadow:var(--shadow);}
  .stat.lime{background:var(--accent);}
  .stat .lab{font-size:12px;color:var(--muted);font-weight:500;display:flex;align-items:center;gap:5px;}
  .stat.lime .lab{color:var(--accent-deep);}
  .stat .num{font-family:'Unbounded';font-weight:600;font-size:30px;margin-top:8px;letter-spacing:-1px;}
  .stat.lime .num{color:var(--accent-deep);}
  .stat .sub{font-size:11px;color:var(--muted);margin-top:2px;}
  .stat.lime .sub{color:#586800;}
  .section-h{display:flex;align-items:center;justify-content:space-between;margin:6px 2px 14px;}
  .section-h h2{font-family:'Unbounded';font-weight:500;font-size:17px;letter-spacing:-0.3px;}
  .section-h a{font-size:13px;color:var(--muted);font-weight:500;text-decoration:none;cursor:pointer;}
  .disclosure{width:100%;background:var(--card);border:none;border-radius:18px;padding:16px 18px;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-family:'Onest';margin-bottom:13px;}
  .disclosure .dl{font-family:'Unbounded';font-weight:500;font-size:15px;color:var(--ink);}
  .disclosure .dc{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;font-weight:500;}
  .disclosure svg{width:18px;height:18px;stroke:var(--muted);transition:transform .2s;}
  .disclosure.open svg{transform:rotate(180deg);}
  .wcard{background:var(--card);border-radius:24px;padding:18px 56px 18px 18px;margin-bottom:13px;box-shadow:var(--shadow);cursor:pointer;transition:transform .15s ease;position:relative;overflow:hidden;}
  .wcard:active{transform:scale(0.98);}
  .wcard .date{font-size:12px;color:var(--muted);font-weight:500;}
  .wcard .wname{font-family:'Unbounded';font-weight:500;font-size:18px;margin-top:4px;letter-spacing:-0.3px;}
  .wcard .meta{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
  .wcard .arrow{position:absolute;right:18px;top:18px;width:30px;height:30px;border-radius:10px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;}
  .wcard .doneflag{position:absolute;right:18px;top:18px;width:30px;height:30px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;}
  .wcard .doneflag svg{width:17px;height:17px;stroke:var(--accent-deep);}
  .cardtrash{position:absolute;right:14px;top:14px;width:32px;height:32px;border-radius:10px;background:var(--paper);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2;}
  .cardtrash svg{width:16px;height:16px;stroke:#b06a6a;}
  .ctag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:4px 9px;border-radius:9px;background:var(--accent-soft);color:var(--accent-deep);}
  .ctag.gray{background:var(--paper);color:#56554c;}
  .ctag.plan{background:transparent;border:1.5px solid var(--ink);color:var(--ink);}
  .empty{background:var(--card);border-radius:24px;padding:34px 22px;text-align:center;box-shadow:var(--shadow);color:var(--muted);}
  .empty svg{width:34px;height:34px;stroke:var(--muted);margin-bottom:12px;}
  .empty p{font-size:14px;line-height:1.5;}
  .fab{position:absolute;left:20px;right:20px;bottom:88px;z-index:5;}
  .fab button{width:100%;border:none;background:var(--ink);color:#fff;font-family:'Onest';font-weight:600;font-size:16px;padding:18px;border-radius:20px;display:flex;align-items:center;justify-content:center;gap:9px;cursor:pointer;box-shadow:0 10px 28px rgba(21,21,15,0.28);transition:transform .15s ease;}
  .fab button:active{transform:scale(0.97);}
  .fab button .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);}
  .nav{position:absolute;left:0;right:0;bottom:0;height:78px;background:rgba(244,243,237,0.92);backdrop-filter:blur(16px);border-top:1px solid var(--line);display:flex;padding:8px 8px 22px;z-index:4;}
  .nav button{flex:1;border:none;background:none;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--muted);font-size:10.5px;font-weight:500;cursor:pointer;font-family:'Onest';}
  .nav button svg{width:22px;height:22px;}
  .nav button.on{color:var(--ink);}
  .bhead{display:flex;align-items:center;gap:14px;margin-bottom:20px;}
  .bback{width:42px;height:42px;border-radius:14px;background:var(--card);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;flex-shrink:0;}
  .bback svg{width:18px;height:18px;stroke:var(--ink);}
  .bhead .bt{font-family:'Unbounded';font-weight:500;font-size:18px;letter-spacing:-0.3px;}
  .bhead .bd{font-size:12px;color:var(--muted);font-weight:500;margin-top:2px;}
  .tags{display:flex;gap:7px;flex-wrap:wrap;margin:-6px 0 14px;}
  .tag{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:6px 11px;border-radius:12px;white-space:nowrap;}
  .tag.method{background:var(--accent);color:var(--accent-deep);}
  .tag.phase{background:var(--ink);color:#fff;}
  .tag.info{background:var(--card);color:#56554c;box-shadow:var(--shadow);}
  .timerbig{background:var(--ink);color:#fff;border-radius:20px;padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
  .timerbig .tl{font-size:12px;color:#b9b8ac;font-weight:500;}
  .timerbig .tv{font-family:'Unbounded';font-weight:600;font-size:26px;margin-top:3px;letter-spacing:0.5px;}
  .timerbig button{border:none;border-radius:13px;padding:12px 18px;font-family:'Onest';font-weight:600;font-size:14px;cursor:pointer;}
  .timerbig button.go{background:var(--accent);color:var(--accent-deep);}
  .timerbig button.stop{background:#E24B4A;color:#fff;}
  .ex{background:var(--card);border-radius:24px;padding:18px;margin-bottom:13px;box-shadow:var(--shadow);cursor:pointer;transition:transform .15s ease;position:relative;}
  .ex:active{transform:scale(0.98);}
  .ex.done{background:var(--accent-soft);}
  .ex .exhead{display:flex;align-items:center;justify-content:space-between;gap:10px;padding-right:40px;}
  .ex .exname{font-family:'Unbounded';font-weight:500;font-size:15px;letter-spacing:-0.3px;display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
  .ex .exname .check{width:22px;height:22px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .ex .exname .check svg{width:14px;height:14px;stroke:var(--accent-deep);}
  .ex .pr{display:inline-flex;align-items:center;gap:5px;background:var(--accent);color:var(--accent-deep);font-size:11.5px;font-weight:600;padding:5px 10px;border-radius:11px;white-space:nowrap;flex-shrink:0;}
  .ex .pr svg{width:13px;height:13px;}
  .setline{display:flex;gap:7px;margin-top:14px;flex-wrap:wrap;}
  .setchip{background:var(--paper);border-radius:12px;padding:8px 11px;font-size:13px;font-weight:500;}
  .setchip b{font-weight:600;}
  .setchip.empty{color:var(--muted);border:1px dashed var(--line);background:transparent;}
  .mine{font-size:10px;font-weight:600;color:var(--accent-deep);background:var(--accent);padding:3px 7px;border-radius:8px;}
  .lasttime{background:var(--accent-soft);border-radius:20px;padding:15px 17px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
  .lasttime .ll{font-size:11.5px;font-weight:600;color:#5c7a00;display:flex;align-items:center;gap:6px;}
  .lasttime .ll svg{width:13px;height:13px;}
  .lasttime .lv{font-family:'Unbounded';font-weight:500;font-size:16px;color:var(--accent-deep);margin-top:6px;}
  .lasttime .lr{text-align:right;}
  .lasttime .lr .n{font-family:'Unbounded';font-weight:600;font-size:24px;color:var(--accent-deep);line-height:1;}
  .lasttime .lr .t{font-size:11px;color:#5c7a00;margin-top:3px;}
  .pr-banner{background:var(--ink);color:#fff;border-radius:24px;padding:20px 22px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;}
  .pr-banner .l{font-size:12px;color:#b9b8ac;font-weight:500;display:flex;align-items:center;gap:6px;}
  .pr-banner .l svg{width:15px;height:15px;color:var(--accent);}
  .pr-banner .v{font-family:'Unbounded';font-weight:600;font-size:26px;margin-top:6px;letter-spacing:-0.5px;}
  .pr-banner .v span{color:var(--accent);}
  .setrow{background:var(--card);border-radius:18px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);}
  .setrow .check{width:30px;height:30px;border-radius:9px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;background:#fff;}
  .setrow .check.on{background:var(--accent);border-color:var(--accent);}
  .setrow .check svg{width:16px;height:16px;stroke:var(--accent-deep);opacity:0;}
  .setrow .check.on svg{opacity:1;}
  .setrow .idx{font-size:11px;color:var(--muted);font-weight:600;width:16px;flex-shrink:0;}
  .setrow .vals{flex:1;display:flex;align-items:baseline;gap:8px;}
  .setrow .vals .w{font-family:'Unbounded';font-weight:500;font-size:19px;}
  .setrow .vals .x{color:var(--muted);font-size:14px;}
  .setrow .vals .r{font-size:15px;font-weight:600;}
  .setrow .best{font-size:11px;font-weight:600;color:var(--accent-deep);background:var(--accent);padding:4px 8px;border-radius:9px;}
  .setrow .del{border:none;background:none;color:var(--muted);cursor:pointer;padding:4px;}
  .setrow .del svg{width:16px;height:16px;}
  .setrow.editing{gap:8px;}
  .setrow .setedit{width:60px;border:1px solid var(--ink);background:#fff;border-radius:12px;padding:10px 4px;font-family:'Onest';font-size:15px;font-weight:600;text-align:center;outline:none;color:var(--ink);}
  .setrow .savesm{margin-left:auto;border:none;background:var(--accent);color:var(--accent-deep);border-radius:11px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .setrow .savesm svg{width:18px;height:18px;}
  .exnav{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--accent-soft);border-radius:14px;padding:8px 10px;margin:-6px 0 16px;}
  .exnav .exnavb{width:34px;height:34px;border-radius:10px;border:none;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
  .exnav .exnavb svg{width:17px;height:17px;stroke:var(--accent-deep);}
  .exnav .exnavb:disabled{opacity:0.35;cursor:default;}
  .exnav .exnavc{flex:1;text-align:center;font-size:13px;font-weight:600;color:var(--accent-deep);}
  .addset{display:flex;gap:9px;margin-top:6px;align-items:center;}
  .addset input{width:66px;border:1px solid var(--line);background:var(--card);border-radius:15px;padding:13px 6px;font-family:'Onest';font-size:15px;font-weight:600;text-align:center;outline:none;color:var(--ink);}
  .addset input:focus{border-color:var(--ink);}
  .addset .mult{color:var(--muted);font-size:15px;font-weight:600;}
  .addset button{border:none;background:var(--accent);color:var(--accent-deep);border-radius:15px;width:48px;height:46px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-left:auto;}
  .addset button svg{width:22px;height:22px;}
  .resttoggle{width:100%;border:1px solid var(--line);background:var(--card);border-radius:15px;padding:13px;margin-top:12px;font-family:'Onest';font-weight:600;font-size:14px;color:#56554c;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;box-shadow:var(--shadow);}
  .resttoggle svg{width:17px;height:17px;stroke:#56554c;}
  .restpresets{display:none;gap:8px;margin-top:10px;}
  .restpresets.open{display:flex;flex-wrap:wrap;}
  .restpresets button{flex:1 0 60px;border:1px solid var(--line);background:var(--card);border-radius:13px;padding:11px 4px;font-family:'Onest';font-weight:600;font-size:13px;color:#56554c;cursor:pointer;box-shadow:var(--shadow);}
  .comment{background:var(--accent-soft);border-radius:20px;padding:16px;margin-top:20px;}
  .comment .cl{font-size:12px;font-weight:600;color:var(--accent-deep);display:flex;align-items:center;gap:6px;margin-bottom:7px;}
  .comment .cl svg{width:14px;height:14px;}
  .comment textarea{width:100%;border:none;background:transparent;resize:none;font-family:'Onest';font-size:14px;color:#4a4f2f;line-height:1.5;outline:none;min-height:44px;}
  .comment textarea::placeholder{color:#9bb15a;}
  .progcard{background:var(--card);border-radius:20px;padding:16px 18px;margin-bottom:11px;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:transform .12s ease;}
  .progcard:active{transform:scale(0.98);}
  .progcard .pn{font-family:'Unbounded';font-weight:500;font-size:15px;}
  .progcard .ps{font-size:12px;color:var(--muted);margin-top:3px;}
  .progcard svg{width:18px;height:18px;stroke:var(--muted);flex-shrink:0;}
  .chartcard{background:var(--card);border-radius:26px;padding:22px 20px 16px;box-shadow:var(--shadow);margin-bottom:16px;}
  .chartcard .ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
  .chartcard .ch .t{font-family:'Unbounded';font-weight:500;font-size:15px;}
  .chartcard .ch .up{font-size:12px;font-weight:600;color:#5c7a00;background:var(--accent-soft);padding:4px 9px;border-radius:10px;}
  .chartcard .big{font-family:'Unbounded';font-weight:600;font-size:32px;letter-spacing:-1px;margin:6px 0 2px;}
  .chartcard .bs{font-size:12px;color:var(--muted);}
  .goalcard{background:var(--ink);color:#fff;border-radius:28px;padding:22px;margin-bottom:18px;}
  .goalcard .gt{font-size:12px;color:#b9b8ac;font-weight:500;display:flex;align-items:center;gap:6px;}
  .goalcard .gt svg{width:14px;height:14px;color:var(--accent);}
  .goalcard .gbig{font-family:'Unbounded';font-weight:600;font-size:22px;margin:10px 0 3px;letter-spacing:-0.3px;}
  .goalcard .gbig span{color:var(--accent);}
  .goalcard .gsub{font-size:12px;color:#9a998e;line-height:1.5;}
  .gprog{height:10px;background:#2c2c22;border-radius:6px;margin-top:16px;overflow:hidden;}
  .gprog i{display:block;height:100%;background:var(--accent);border-radius:6px;}
  .glabels{display:flex;justify-content:space-between;font-size:11px;color:#9a998e;margin-top:8px;}
  .goalbtn{margin-top:14px;width:100%;border:none;background:var(--accent);color:var(--accent-deep);border-radius:13px;padding:12px;font-family:'Onest';font-weight:700;cursor:pointer;}
  .infogrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
  .infocard{background:var(--card);border-radius:22px;padding:16px 17px;box-shadow:var(--shadow);}
  .infocard .il{font-size:12px;color:var(--muted);font-weight:500;}
  .infocard .iv{font-family:'Unbounded';font-weight:600;font-size:22px;letter-spacing:-0.5px;margin-top:7px;}
  .infocard .iv small{font-size:12px;color:var(--muted);font-weight:400;font-family:'Onest';}
  .bmicard{background:var(--ink);color:#fff;border-radius:24px;padding:18px 20px;margin-bottom:18px;}
  .bmicard .bh{display:flex;justify-content:space-between;align-items:baseline;}
  .bmicard .bh .bl{font-size:12px;color:#b9b8ac;}
  .bmicard .bh .bz{font-size:11px;font-weight:600;}
  .bmicard .bv{font-family:'Unbounded';font-weight:600;font-size:28px;margin:4px 0 14px;}
  .bmibar{position:relative;height:8px;border-radius:5px;background:linear-gradient(90deg,#5BA3E0 0%,#5BA3E0 18%,#C7F23D 18%,#C7F23D 46%,#E9C84B 46%,#E9C84B 70%,#E0894B 70%,#E0894B 100%);}
  .bmibar .mk{position:absolute;top:-4px;width:3px;height:16px;background:#fff;border-radius:2px;box-shadow:0 0 0 2px #15150F;}
  .bmilabels{display:flex;justify-content:space-between;font-size:9px;color:#9a998e;margin-top:6px;}
  .bmihint{font-size:11.5px;color:#b9b8ac;line-height:1.55;margin-top:14px;padding-top:14px;border-top:1px solid #2c2c22;}
  .mgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
  .mcard{background:var(--card);border-radius:22px;padding:16px 17px;box-shadow:var(--shadow);}
  .mcard .ml{font-size:12px;color:var(--muted);font-weight:500;}
  .mcard .mv{font-family:'Unbounded';font-weight:600;font-size:25px;letter-spacing:-0.5px;margin-top:7px;}
  .mcard .mv small{font-size:13px;color:var(--muted);font-weight:400;font-family:'Onest';}
  .mcard .md{font-size:12px;font-weight:600;margin-top:5px;display:inline-flex;align-items:center;gap:3px;}
  .mcard .md.down{color:#5c7a00;} .mcard .md.up{color:#b06a00;} .mcard .md.flat{color:var(--muted);}
  .photos{display:flex;gap:11px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
  .photos::-webkit-scrollbar{display:none;}
  .photo{flex:0 0 110px;height:150px;border-radius:20px;position:relative;overflow:hidden;display:flex;align-items:flex-end;padding:11px;background-size:cover;background-position:center;}
  .photo span{font-size:11px;font-weight:600;color:#fff;position:relative;z-index:2;background:rgba(0,0,0,0.4);padding:3px 8px;border-radius:8px;}
  .photo.add{border:2px dashed var(--line);background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted);cursor:pointer;}
  .photo.add svg{width:26px;height:26px;} .photo.add small{font-size:11px;font-weight:500;}
  .calcard{background:var(--card);border-radius:26px;padding:20px 18px 18px;box-shadow:var(--shadow);margin-bottom:16px;}
  .calhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .calhead .cm{font-family:'Unbounded';font-weight:500;font-size:17px;}
  .calhead .cnav{display:flex;gap:8px;}
  .calhead .cnav button{width:32px;height:32px;border-radius:10px;border:none;background:var(--paper);display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .calhead .cnav svg{width:16px;height:16px;stroke:var(--ink);}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .calgrid .dow{font-size:11px;color:var(--muted);text-align:center;font-weight:600;padding-bottom:4px;}
  .cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;}
  .cell.blank{visibility:hidden;}

function exMatches(q){
  q=(q||'').toLowerCase().trim();var out=[];
  state.customExercises.forEach(function(n){ if(!q||n.toLowerCase().indexOf(q)>=0) out.push({n:n,mine:true}); });
  LIB.forEach(function(l){ var hit=!q||l.n.toLowerCase().indexOf(q)>=0||l.a.some(function(x){return x.toLowerCase().indexOf(q)>=0;}); if(hit) out.push({n:l.n,mine:false}); });
  return out.slice(0,40);
}
function filterEx(q,wid){
  var box=document.getElementById('exlist'); if(!box)return;
  var ms=exMatches(q); var html=''; var qn=(q||'').trim();
  var exact=ms.some(function(m){return m.n.toLowerCase()===qn.toLowerCase();});
  if(qn && !exact && ms.length===0){ html+='<div class="exrow addnew" onclick="addCustomEx(\''+wid+'\',\''+esc(qn).replace(/'/g,"\\'")+'\')"><span class="en">+ Добавить «'+esc(qn)+'»</span><span class="mine">моё</span></div>'; }
  html+=ms.map(function(m){return '<div class="exrow" onclick="pickEx(\''+wid+'\',\''+esc(m.n).replace(/'/g,"\\'")+'\')"><span class="en">'+esc(m.n)+'</span>'+(m.mine?'<span class="mine">моё</span>':'')+'</div>';}).join('');
  if(qn && !exact && ms.length>0){ html+='<div class="exrow addnew" onclick="addCustomEx(\''+wid+'\',\''+esc(qn).replace(/'/g,"\\'")+'\')"><span class="en">+ Добавить «'+esc(qn)+'» как своё</span><span class="mine">моё</span></div>'; }
  box.innerHTML=html||'<div class="empty" style="padding:20px"><p>Начни вводить название упражнения.</p></div>';
}

function swipeExercise(dir){

function attachSwipe(){
  var el=document.getElementById('exview'); if(!el)return;
  var x0=null,y0=null;
  el.addEventListener('touchstart',function(ev){var t=ev.changedTouches[0];x0=t.clientX;y0=t.clientY;},{passive:true});
  el.addEventListener('touchend',function(ev){
    if(x0===null)return;var t=ev.changedTouches[0];var dx=t.clientX-x0,dy=t.clientY-y0;
    if(Math.abs(dx)>60 && Math.abs(dx)>Math.abs(dy)*1.6){ swipeExercise(dx<0?1:-1); }
    x0=null;y0=null;
  },{passive:true});
}

function viewExProgress(name){

  } else { chart='<div class="empty"style="margin-top:4px">'+I.bolt+'<p>Для графика нужно ≥2 тренировок<br>с этим упражнением.</p></div>'; }
  return '<div class="view"><div class="bhead"><button class="bback" onclick="go(\'progress\')">'+I.back+'</button><div><div class="bt">'+esc(name)+'</div><div class="bd">Прогресс по упражнению</div></div></div>'
    +'<div class="infogrid">'
    +'<div class="infocard"><div class="il">1ПМ (оценка)</div><div class="iv">'+(rm?rm+' <small>кг</small>':'—')+'</div></div>'
    +'<div class="infocard"><div class="il">Лучший результат</div><div class="iv">'+(best?best.w+'×'+best.r:'—')+'</div>'+(best?'<div style="font-size:11px;color:var(--muted);margin-top:4px">'+fmtDate(best.date)+'</div>':'')+'</div>'
    +'</div>'+chart+'<div style="height:30px"></div></div>';
}

  state.profile.name=document.getElementById('s-name').value.trim();
  state.profile.age=parseInt(document.getElementById('s-age').value,10)||null;
  state.profile.height=parseInt(document.getElementById('s-height').value,10)||null;
  var sw=parseFloat(document.getElementById('s-start').value), gw=parseFloat(document.getElementById('s-goal').value);
  if(sw)state.goal.startW=sw; if(gw)state.goal.goalW=gw;
  var dl=document.getElementById('s-deadline').value; if(dl)state.goal.deadline=dl;
  state.onboarded=true; await save();
  go(from==='onboard'?'home':'body');
}
async function skipSurvey(){ state.onboarded=true; await save(); go(route.params.from==='onboard'?'home':'body'); }

function addPhoto(input){var f=input.files&&input.files[0];if(!f)return;var img=new Image();var rd=new FileReader();rd.onload=function(){img.onload=function(){var c=document.createElement('canvas');var max=420;var sc=Math.min(1,max/Math.max(img.width,img.height));c.width=img.width*sc;c.height=img.height*sc;c.getContext('2d').drawImage(img,0,0,c.width,c.height);var data=c.toDataURL('image/jpeg',0.7);if(!state.photos)state.photos=[];state.photos.push({label:'Нед '+(state.photos.length+1),data:data});save().then(render);};img.src=rd.result;};rd.readAsDataURL(f);}
function exportData(){try{var blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='tanya-trenit-backup.json';document.body.appendChild(a);a.click();a.remove();}catch(e){alert('Не удалось выгрузить');}}
function importData(input){var f=input.files&&input.files[0];if(!f)return;var rd=new FileReader();rd.onload=function(){try{var data=JSON.parse(rd.result);if(!data.workouts){alert('Файл не похож на резервную копию');return;}if(!confirm('Заменить текущие данные данными из файла?'))return;state=data;if(!state.customExercises)state.customExercises=[];if(!state.templates)state.templates=[];save().then(function(){go('home');});}catch(e){alert('Не удалось прочитать файл');}};rd.readAsText(f);}

/* workout timer (toggle) */
var wTick=null;
async function toggleTimer(id){
  var w=findWorkout(id); if(!w)return;
  if(w.timerStart && !w.timerEnd){ // running -> stop
    w.timerAccum=(w.timerAccum||0)+Math.floor((Date.now()-w.timerStart)/1000);
    w.timerEnd=Date.now(); w.timerStart=null;
  } else { // start/resume
    w.timerStart=Date.now(); w.timerEnd=null;
  }
  await save(); render();
}
function manageTimerTick(){
  if(wTick){clearInterval(wTick);wTick=null;}
  if(route.name==='workout'){
    var w=findWorkout(route.params.id);
    if(w&&w.timerStart&&!w.timerEnd){
      wTick=setInterval(function(){
        var el=document.getElementById('wtimer'); if(!el){clearInterval(wTick);wTick=null;return;}
        var sec=Math.floor((Date.now()-w.timerStart)/1000)+(w.timerAccum||0);
        el.textContent=fmtMS(sec);
      },1000);
    }
  }
}

/* rest timer (manual) */
var restInt=null,restRem=0;
function showRest(){document.getElementById('rt').innerHTML='<b>'+fmtMS(restRem)+'</b>';document.getElementById('restbar').classList.add('on');}
function startRest(sec){restRem=sec;showRest();if(restInt)clearInterval(restInt);restInt=setInterval(function(){restRem--;if(restRem<=0){clearInterval(restInt);restInt=null;document.getElementById('rt').innerHTML='<b>Отдых окончен!</b>';try{if(TG&&TG.HapticFeedback)TG.HapticFeedback.notificationOccurred('success');else if(navigator.vibrate)navigator.vibrate(300);}catch(e){}setTimeout(stopRest,1800);}else showRest();},1000);}
function addRest(s){restRem+=s;showRest();}
function stopRest(){if(restInt)clearInterval(restInt);restInt=null;document.getElementById('restbar').classList.remove('on');}

(async function(){await load(); if(!state.onboarded){route={name:'survey',params:{from:'onboard'}};} render();})();
</script>
